services:
  - type: web
    name: marketplace-prototype
    runtime: node
    buildCommand: npm install
    startCommand: node render-server.js
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: connectionString

databases:
  - name: marketplace-db
    databaseName: marketplace
    user: marketplace
